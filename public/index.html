<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koppi — Stablecoins for everyone</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js" type="text/javascript"></script>
    <script src="https://auth.privy.io/widget.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #F4F5F7; font-family: -apple-system, sans-serif; color: #020202; min-height: 100vh; display: flex; flex-direction: column; }
        #landing-page { width: 100%; display: flex; flex-direction: column; align-items: center; flex: 1; }
        nav { width: 100%; height: 80px; background: rgba(244, 245, 247, 0.85); backdrop-filter: blur(20px); position: fixed; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 0 40px; border-bottom: 1px solid rgba(0, 0, 0, 0.04); }
        .logo { font-size: 20px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; }
        .btn-cta { height: 42px; padding: 0 24px; background: #020202; color: #ffffff; font-size: 12px; font-weight: 700; text-transform: uppercase; border-radius: 21px; border: none; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
        .main-wrapper { flex: 1; max-width: 960px; width: 100%; margin: 0 auto; padding: 160px 24px 80px 24px; display: flex; flex-direction: column; align-items: center; }
        .hero-section { text-align: center; max-width: 640px; margin-bottom: 80px; }
        h1 { font-size: 48px; font-weight: 800; letter-spacing: -1.5px; line-height: 1.15; margin-bottom: 20px; }
        #web-app-portal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #F4F5F7; z-index: 1000; display: none; overflow-y: auto; padding: 40px 24px; }
        .app-container { max-width: 400px; width: 100%; margin: 40px auto; }
        .app-card { background: #ffffff; border: 1px solid rgba(0,0,0,0.03); border-radius: 28px; padding: 42px 32px; box-shadow: 0 10px 40px rgba(0,0,0,0.02); text-align: center; }
        .btn-submit { width: 100%; height: 50px; background: #020202; color: #fff; font-size: 13px; font-weight: 700; border-radius: 25px; border: none; cursor: pointer; text-transform: uppercase; margin-top: 20px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="landing-page">
        <nav>
            <div class="logo">Koppi</div>
            <button onclick="openWebApp()" class="btn-cta">Open Web App</button>
        </nav>
        <div class="main-wrapper">
            <div class="hero-section">
                <h1>Make stablecoins your everyday money</h1>
                <button onclick="openWebApp()" class="btn-cta" style="height: 52px; padding: 0 36px;">Get Started</button>
            </div>
        </div>
    </div>

    <div id="web-app-portal">
        <div class="app-container">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
                <div class="logo" style="font-size: 16px;">Koppi App</div>
                <button onclick="closeWebApp()" style="background:none; border:none; cursor:pointer; font-size:11px; font-weight:700;">EXIT</button>
            </header>

            <div id="auth-view" class="app-card">
                <h2>Connect to Koppi</h2>
                <p>Click below to sign in or register.</p>
                <!-- Bouton bindé explicitement -->
                <button id="login-trigger-btn" class="btn-submit">Sign in or Register</button>
            </div>

            <div id="dashboard-view" class="hidden">
                <div class="app-card">
                    <div id="wallet-address" style="font-family:monospace; font-size: 12px; margin-bottom: 20px;">...</div>
                    <button id="buy-btn" class="btn-submit">Add Money</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const PRIVY_APP_ID = "ton-privy-app-id";
        
        // Initialisation globale
        const privy = window.PrivyWidget({
            appId: PRIVY_APP_ID,
            onSuccess: (user) => {
                document.getElementById('auth-view').classList.add('hidden');
                document.getElementById('dashboard-view').classList.remove('hidden');
                const addr = user.embeddedWallets?.[0]?.address || user.wallets?.[0]?.address;
                document.getElementById('wallet-address').innerText = addr;
            }
        });

        // BINDING ROBUSTE : On s'assure que le bouton est chargé
        window.onload = () => {
            document.getElementById('login-trigger-btn').addEventListener('click', () => {
                privy.login();
            });
        };

        function openWebApp() {
            document.getElementById('landing-page').style.setProperty('display', 'none', 'important');
            document.getElementById('web-app-portal').style.setProperty('display', 'block', 'important');
        }

        function closeWebApp() {
            document.getElementById('web-app-portal').style.setProperty('display', 'none', 'important');
            document.getElementById('landing-page').style.setProperty('display', 'flex', 'important');
        }
    </script>
</body>
</html>
