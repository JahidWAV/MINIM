<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koppi</title>
    <!-- Ethers.js pour la communication RPC Base Sepolia -->
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js" type="text/javascript"></script>
    <!-- SDK Privy Web Autonome -->
    <script src="https://auth.privy.io/widget.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #F4F5F7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #020202;
            line-height: 1.6;
            padding: 40px 20px;
        }
        .container { max-width: 440px; margin: 0 auto; padding-top: 5vh; }
        header { margin-bottom: 40px; display: flex; justify-content: space-between; items: center; }
        h1 { font-size: 24px; font-weight: 300; letter-spacing: 12px; color: #020202; text-transform: uppercase; }
        
        .avatar-circle { width: 32px; height: 32px; id: user-avatar; border-radius: 50%; bg-color: rgba(168, 85, 247, 0.15); background: rgba(168, 85, 247, 0.15); display: flex; align-items: center; justify-content: center; font-size: 15px; }
        
        /* BOÎTIER PREMIUM CLAIR STYLE KOPPI */
        .balance-card {
            background: #ffffff;
            border: 1px solid rgba(0, 0, 0, 0.04);
            padding: 32px 24px;
            border-radius: 24px;
            text-align: center;
            margin-bottom: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.01);
        }
        .balance-amount { font-size: 42px; font-weight: 700; color: #020202; letter-spacing: -1px; }
        .balance-fraction { font-size: 22px; font-weight: 700; color: #888888; vertical-align: super; }
        .wallet-address { font-family: monospace; color: #888888; font-size: 11px; margin-top: 8px; letter-spacing: 1px; font-weight: 500; }
        
        .btn-group { display: flex; gap: 12px; margin-top: 24px; }
        .btn {
            flex: 1;
            height: 48px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: none;
        }
        .btn-primary { background: #020202; color: #ffffff; }
        .btn-primary:hover { background: #1a1a1a; }
        .btn-secondary { background: rgba(0, 0, 0, 0.04); color: #020202; border: 1px solid rgba(0, 0, 0, 0.04); }
        .btn-secondary:hover { background: rgba(0, 0, 0, 0.08); }

        /* LISTE DES TRANSACTIONS */
        section { margin-bottom: 40px; }
        h2 { font-size: 11px; font-weight: 600; letter-spacing: 2px; color: #888888; text-transform: uppercase; margin-bottom: 16px; border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 8px; }
        
        .tx-container { background: #ffffff; border: 1px solid rgba(0, 0, 0, 0.04); border-radius: 20px; overflow: hidden; }
        .tx-item { padding: 16px; display: flex; justify-content: space-between; items: center; border-bottom: 1px solid rgba(0,0,0,0.04); font-size: 14px; }
        .tx-item:last-child { border-bottom: none; }
        .tx-info { display: flex; align-items: center; gap: 12px; }
        .tx-icon { font-size: 16px; }
        .tx-meta .tx-title { font-weight: 600; color: #020202; }
        .tx-meta .tx-subtitle { font-size: 11px; color: #888888; margin-top: 1px; }
        .tx-amount { font-weight: 600; }
        .tx-amount.positive { color: #10b981; }
        .tx-amount.negative { color: #020202; }
        
        .empty-state { padding: 32px; text-align: center; color: #888888; font-size: 13px; }

        /* PIPELINE D'AUTHENTIFICATION PROGRAMMATIQUE */
        .auth-box { text-align: left; padding: 40px 0; }
        .auth-box h2 { border: none; font-size: 36px; color: #020202; text-transform: none; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 12px; padding-bottom: 0; }
        .auth-box p { color: #888888; font-size: 15px; margin-bottom: 40px; font-weight: 400; }
        
        .input-field {
            width: 100%;
            height: 54px;
            background: rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(0, 0, 0, 0.04);
            border-radius: 12px;
            padding: 0 16px;
            font-size: 15px;
            color: #020202;
            margin-bottom: 16px;
            outline: none;
            transition: all 0.2s;
        }
        .input-field:focus {
            background: #ffffff;
            border-color: rgba(0,0,0,0.15);
        }
        .input-field::placeholder { color: #888888; }
        .otp-input { text-align: center; font-family: monospace; font-size: 18px; letter-spacing: 4px; }
        
        .status-msg { font-size: 13px; color: #888888; margin-bottom: 16px; text-align: center; }
        .back-link { display: block; text-align: center; color: #888888; font-size: 14px; text-decoration: none; margin-top: 16px; cursor: pointer; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="container">
        <!-- HEADER -->
        <header>
            <h1>Koppi</h1>
            <div id="user-avatar" class="avatar-circle hidden">🧝‍♀️</div>
        </header>

        <!-- INTERFACE D'AUTHENTIFICATION COMPLÈTE VIA MAIL -->
        <div id="auth-view" class="auth-box">
            <h2>Make stablecoins<br>your everyday money</h2>
            <p>Access USD, buy instantly and spend globally using secure keyless infrastructure.</p>
            
            <!-- Formulaire Étape 1 : Saisie de l'E-mail -->
            <div id="email-step">
                <input type="email" id="email-input" class="input-field" placeholder="Enter your email address" autocomplete="off">
                <button id="send-code-btn" class="btn btn-primary" style="width: 100%; height: 54px; border-radius: 27px;">Get started</button>
            </div>

            <!-- Formulaire Étape 2 : Vérification du Code OTP -->
            <div id="otp-step" class="hidden">
                <input type="text" id="otp-input" class="input-field otp-input" placeholder="000000" maxlength="6" autocomplete="off">
                <div id="status-message" class="status-msg"></div>
                <button id="verify-code-btn" class="btn btn-primary" style="width: 100%; height: 54px; border-radius: 27px;">Verify and Connect</button>
                <a id="back-btn" class="back-link">Go back</a>
            </div>
        </div>

        <!-- INTERFACE CONNECTÉE (DASHBOARD CLAIR PREMIUM) -->
        <div id="dashboard-view" class="hidden">
            <!-- Boîtier de Solde Principal -->
            <div class="balance-card">
                <div class="balance-amount">
                    <span id="balance-int">0</span><span id="balance-frac" class="balance-fraction">.00$</span>
                </div>
                <div id="wallet-address" class="wallet-address">0x0000...0000</div>
                
                <div class="btn-group">
                    <button id="buy-btn" class="btn btn-primary">Add Money</button>
                    <button id="transfer-btn" class="btn btn-secondary">Transfer</button>
                </div>
            </div>

            <!-- Liste Temporelle d'Activité Réelle -->
            <section id="activity-section">
                <h2>Recent Activity</h2>
                <div class="tx-container" id="tx-list">
                    <div class="empty-state" id="no-tx">No transactions found on Base Sepolia</div>
                </div>
            </section>
        </div>
    </div>

    <!-- CODE LOGIQUE PRIVY PROGRAMMATIQUE & RPC INFRASTRUCTURE -->
    <script>
        const PRIVY_APP_ID = "ton-privy-app-id"; // Remplace par ton identifiant Privy exact
        const USDC_CONTRACT = "0xD733D48f2a7F57D4559F98ae07f87Dab595E3523";
        const RPC_URL = "https://sepolia.base.org";
        const provider = new ethers.providers.JsonRpcProvider(RPC_URL);

        // Initialisation du SDK Privy Web
        const privy = window.PrivyWidget({
            appId: PRIVY_APP_ID,
            onSuccess: (user) => {
                setupUserDashboard(user);
            }
        });

        // --- GESTION DES FLUX D'AUTHENTIFICATION PAR EMAIL ---
        const emailInput = document.getElementById('email-input');
        const otpInput = document.getElementById('otp-input');
        const emailStep = document.getElementById('email-step');
        const otpStep = document.getElementById('otp-step');
        const statusMessage = document.getElementById('status-message');

        // Étape 1 : Demande d'envoi du code OTP
        document.getElementById('send-code-btn').addEventListener('click', async () => {
            const email = emailInput.value.trim().toLowerCase();
            if (!email.includes('@')) return;

            document.getElementById('send-code-btn').innerText = "Sending...";
            try {
                // Utilisation de l'API d'envoi programmatique du SDK Privy
                await privy.auth.sendCode({ email: email });
                emailStep.classList.add('hidden');
                otpStep.classList.remove('withAnimation', 'hidden');
                statusMessage.innerText = "Code sent via Privy!";
            } catch (err) {
                // Fallback / Pipeline de redirection si l'API est restreinte en direct
                emailStep.classList.add('hidden');
                otpStep.classList.remove('hidden');
                statusMessage.innerText = "Enter the magic code received.";
            } finally {
                document.getElementById('send-code-btn').innerText = "Get started";
            }
        });

        // Étape 2 : Vérification du code OTP
        document.getElementById('verify-code-btn').addEventListener('click', async () => {
            const code = otpInput.value.trim();
            const email = emailInput.value.trim().toLowerCase();
            if (code.length !== 6) return;

            document.getElementById('verify-code-btn').innerText = "Connecting...";
            try {
                // Validation du code OTP
                const user = await privy.auth.loginWithCode({ code: code, email: email });
                setupUserDashboard(user);
            } catch (err) {
                statusMessage.style.color = "#ef4444";
                statusMessage.innerText = "Invalid or expired code. Try again.";
                document.getElementById('verify-code-btn').innerText = "Verify and Connect";
            }
        });

        // Bouton retour
        document.getElementById('back-btn').addEventListener('click', () => {
            otpStep.classList.add('hidden');
            emailStep.classList.remove('hidden');
            otpInput.value = "";
            statusMessage.innerText = "";
            statusMessage.style.color = "#888888";
        });

        document.getElementById('buy-btn').addEventListener('click', () => {
            privy.openFunding({ method: 'moonpay' });
        });

        // --- DISPATCH DU DASHBOARD CONTRÔLÉ ---
        function setupUserDashboard(user) {
            document.getElementById('auth-view').classList.add('hidden');
            document.getElementById('dashboard-view').classList.remove('hidden');
            document.getElementById('user-avatar').classList.remove('hidden');
            
            const activeWallet = user.embeddedWallets?.[0]?.address || user.wallets?.[0]?.address;
            if (activeWallet) {
                document.getElementById('wallet-address').innerText = activeWallet.substring(0, 8).toUpperCase() + '...' + activeWallet.substring(activeWallet.length - 8).toUpperCase();
                syncBalancesAndLogs(activeWallet);
            }
        }

        async function syncBalancesAndLogs(walletAddress) {
            try {
                const abi = ["function balanceOf(address owner) view returns (uint256)"];
                const contract = new ethers.Contract(USDC_CONTRACT, abi, provider);
                const rawBalance = await contract.balanceOf(walletAddress);
                
                const formatted = ethers.utils.formatUnits(rawBalance, 18);
                const segments = parseFloat(formatted).toFixed(2).split('.');
                
                document.getElementById('balance-int').innerText = segments[0];
                document.getElementById('balance-frac').innerText = '.' + segments[1] + '$';

                fetchOnChainLogs(walletAddress);
            } catch (error) {
                console.error("Erreur de synchronisation blockchain :", error);
            }
        }

        async function fetchOnChainLogs(walletAddress) {
            try {
                const transferTopic = ethers.utils.id("Transfer(address,address,uint256)");
                const paddedWallet = ethers.utils.hexZeroPad(walletAddress, 32).toLowerCase();
                
                const logs = await provider.getLogs({
                    address: USDC_CONTRACT,
                    fromBlock: 0,
                    toBlock: "latest",
                    topics: [transferTopic]
                });

                const filteredLogs = logs.filter(log => 
                    log.topics[1].toLowerCase() === paddedWallet || log.topics[2].toLowerCase() === paddedWallet
                ).reverse();

                if (filteredLogs.length > 0) {
                    const txListContainer = document.getElementById('tx-list');
                    txListContainer.innerHTML = "";
                    
                    filteredLogs.slice(0, 10).forEach(log => {
                        const isIncoming = log.topics[2].toLowerCase() === paddedWallet;
                        const rawAmount = ethers.BigNumber.from(log.data);
                        const cleanAmount = ethers.utils.formatUnits(rawAmount, 18);
                        
                        const row = document.createElement('div');
                        row.className = "tx-item";
                        row.innerHTML = `
                            <div class="tx-info">
                                <span class="tx-icon">${isIncoming ? '👇' : '👆'}</span>
                                <div class="tx-meta">
                                    <div class="tx-title">${isIncoming ? 'Received' : 'Sent'}</div>
                                    <div class="tx-subtitle">USDC • Base Sepolia</div>
                                </div>
                            </div>
                            <div class="tx-amount ${isIncoming ? 'positive' : 'negative'}">
                                ${isIncoming ? '+' : '-'} ${parseFloat(cleanAmount).toFixed(2)}$
                            </div>
                        `;
                        txListContainer.appendChild(row);
                    });
                }
            } catch (err) {
                console.error("Impossible de lire l'historique :", err);
            }
        }
    </script>
</body>
</html>
