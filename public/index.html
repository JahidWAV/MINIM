<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koppi</title>
    <!-- Ethers.js pour la communication RPC Base Sepolia -->
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js" type="text/javascript"></script>
    <!-- SDK Privy Web Autonome -->
    <script src="https://auth.privy.io/widget.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #000000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #ffffff;
            line-height: 1.6;
            padding: 40px 20px;
        }
        .container { max-width: 440px; margin: 0 auto; padding-top: 5vh; }
        header { margin-bottom: 40px; display: flex; justify-content: space-between; items: center; }
        h1 { font-size: 24px; font-weight: 300; letter-spacing: 12px; color: #ffffff; text-transform: uppercase; }
        
        .avatar-box { w-8 h-8 rounded-full bg-purple-500/20 flex items-center justify-center text-sm; }
        
        /* BOÎTIER PREMIUM STYLE KOPPI */
        .balance-card {
            background: #0a0a0a;
            border: 1px solid #161616;
            padding: 32px 24px;
            border-radius: 24px;
            text-align: center;
            margin-bottom: 40px;
        }
        .balance-amount { font-size: 42px; font-weight: 200; color: #ffffff; letter-spacing: -1px; }
        .balance-fraction { font-size: 22px; font-weight: 400; color: #888888; vertical-align: super; }
        .wallet-address { font-family: monospace; color: #555555; font-size: 11px; margin-top: 8px; letter-spacing: 1px; }
        
        .btn-group { display: flex; gap: 12px; margin-top: 24px; }
        .btn {
            flex: 1;
            height: 48px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary { bg-color: #ffffff; background: #ffffff; color: #000000; border: none; }
        .btn-primary:hover { background: #e5e5e5; }
        .btn-secondary { background: #111111; color: #ffffff; border: 1px solid #222222; }
        .btn-secondary:hover { background: #161616; }

        /* LISTE DES TRANSACTIONS */
        section { margin-bottom: 40px; }
        h2 { font-size: 11px; font-weight: 600; letter-spacing: 2px; color: #444444; text-transform: uppercase; margin-bottom: 16px; border-bottom: 1px solid #111111; padding-bottom: 8px; }
        
        .tx-container { background: #0a0a0a; border: 1px solid #161616; border-radius: 20px; overflow: hidden; }
        .tx-item { padding: 16px; display: flex; justify-content: space-between; items: center; border-bottom: 1px solid #161616; font-size: 14px; }
        .tx-item:last-child { border-bottom: none; }
        .tx-info { display: flex; align-items: center; gap: 12px; }
        .tx-icon { font-size: 16px; }
        .tx-meta .tx-title { font-weight: 500; color: #ffffff; }
        .tx-meta .tx-subtitle { font-size: 11px; color: #555555; margin-top: 1px; }
        .tx-amount { font-weight: 600; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        .tx-amount.positive { color: #34d399; }
        .tx-amount.negative { color: #ffffff; }
        
        .empty-state { padding: 32px; text-center: center; color: #444444; font-size: 13px; text-align: center; }

        /* AUTH VIEW */
        .auth-box { text-align: center; padding: 60px 20px; space-y: 24px; }
        .auth-box h2 { border: none; font-size: 28px; color: #fff; text-transform: none; font-weight: 300; letter-spacing: -0.5px; margin-bottom: 12px; }
        .auth-box p { color: #666666; font-size: 14px; margin-bottom: 32px; font-weight: 300; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="container">
        <!-- HEADER -->
        <header>
            <h1>Koppi</h1>
            <div id="user-avatar" class="hidden" style="font-size: 16px;">🧝‍♀️</div>
        </header>

        <!-- INTERFACE NON CONNECTÉE -->
        <div id="auth-view" class="auth-box">
            <h2>Make stablecoins<br>your everyday money</h2>
            <p>Access USD, buy instantly and spend globally using secure keyless infrastructure.</p>
            <button id="login-btn" class="btn btn-primary" style="width: 100%; height: 54px; border-radius: 27px;">Get started</button>
        </div>

        <!-- INTERFACE CONNECTÉE (DASHBOARD) -->
        <div id="dashboard-view" class="hidden">
            <!-- Boîtier de Solde Principal -->
            <div class="balance-card">
                <div class="balance-amount">
                    <span id="balance-int">0</span><span id="balance-frac" class="balance-fraction">.00$</span>
                </div>
                <div id="wallet-address" class="wallet-address">0x0000...0000</div>
                
                <div class="btn-group">
                    <button id="buy-btn" class="btn btn-primary">Add Money</button>
                    <button id="transfer-btn" class="btn btn-secondary">Transfer</button>
                </div>
            </div>

            <!-- Liste Temporelle d'Activité Réelle -->
            <section id="activity-section">
                <h2>Recent Activity</h2>
                <div class="tx-container" id="tx-list">
                    <div class="empty-state" id="no-tx">No transactions found on Base Sepolia</div>
                </div>
            </section>
        </div>
    </div>

    <!-- CODE LOGIQUE PRIVY & RPC INFRASTRUCTURE -->
    <script>
        const PRIVY_APP_ID = "ton-privy-app-id"; // Remplace par ton identifiant Privy exact
        const USDC_CONTRACT = "0xD733D48f2a7F57D4559F98ae07f87Dab595E3523";
        const RPC_URL = "https://sepolia.base.org";
        const provider = new ethers.providers.JsonRpcProvider(RPC_URL);

        // Initialisation de la session Privy
        const privy = window.PrivyWidget({
            appId: PRIVY_APP_ID,
            onSuccess: (user) => {
                setupUserDashboard(user);
            }
        });

        document.getElementById('login-btn').addEventListener('click', () => privy.login());
        document.getElementById('buy-btn').addEventListener('click', () => {
            privy.openFunding({ method: 'moonpay' });
        });

        function setupUserDashboard(user) {
            document.getElementById('auth-view').classList.add('hidden');
            document.getElementById('dashboard-view').classList.remove('hidden');
            document.getElementById('user-avatar').classList.remove('hidden');
            
            const activeWallet = user.embeddedWallets?.[0]?.address || user.wallets?.[0]?.address;
            if (activeWallet) {
                // Affichage réduit de la clé publique
                document.getElementById('wallet-address').innerText = activeWallet.substring(0, 8).toUpperCase() + '...' + activeWallet.substring(activeWallet.length - 8).toUpperCase();
                
                // Lancement de la synchronisation blockchain
                syncBalancesAndLogs(activeWallet);
            }
        }

        async function syncBalancesAndLogs(walletAddress) {
            try {
                // Lecture stricte ERC-20 à 18 décimales pour ton token de test Base Sepolia
                const abi = ["function balanceOf(address owner) view returns (uint256)"];
                const contract = new ethers.Contract(USDC_CONTRACT, abi, provider);
                const rawBalance = await contract.balanceOf(walletAddress);
                
                const formatted = ethers.utils.formatUnits(rawBalance, 18);
                const segments = parseFloat(formatted).toFixed(2).split('.');
                
                // Rendu propre du solde avec fraction excentrée
                document.getElementById('balance-int').innerText = segments[0];
                document.getElementById('balance-frac').innerText = '.' + segments[1] + '$';

                // Chargement dynamique de la liste des transactions
                fetchOnChainLogs(walletAddress);
            } catch (error) {
                console.error("Erreur de synchronisation blockchain :", error);
            }
        }

        async function fetchOnChainLogs(walletAddress) {
            try {
                const transferTopic = ethers.utils.id("Transfer(address,address,uint256)");
                const paddedWallet = ethers.utils.hexZeroPad(walletAddress, 32).toLowerCase();
                
                const logs = await provider.getLogs({
                    address: USDC_CONTRACT,
                    fromBlock: 0,
                    toBlock: "latest",
                    topics: [transferTopic]
                });

                // Filtrage on-chain des réceptions et envois liés à ton adresse
                const filteredLogs = logs.filter(log => 
                    log.topics[1].toLowerCase() === paddedWallet || log.topics[2].toLowerCase() === paddedWallet
                ).reverse();

                if (filteredLogs.length > 0) {
                    const txListContainer = document.getElementById('tx-list');
                    txListContainer.innerHTML = ""; // Nettoyage de l'état vide
                    
                    filteredLogs.slice(0, 10).forEach(log => {
                        const isIncoming = log.topics[2].toLowerCase() === paddedWallet;
                        const rawAmount = ethers.BigNumber.from(log.data);
                        const cleanAmount = ethers.utils.formatUnits(rawAmount, 18);
                        
                        const row = document.createElement('div');
                        row.className = "tx-item";
                        row.innerHTML = `
                            <div class="tx-info">
                                <span class="tx-icon">${isIncoming ? '📥' : '📤'}</span>
                                <div class="tx-meta">
                                    <div class="tx-title">${isIncoming ? 'Received' : 'Sent'}</div>
                                    <div class="tx-subtitle">USDC • Base Sepolia</div>
                                </div>
                            </div>
                            <div class="tx-amount ${isIncoming ? 'positive' : 'negative'}">
                                ${isIncoming ? '+' : '-'} ${parseFloat(cleanAmount).toFixed(2)}$
                            </div>
                        `;
                        txListContainer.appendChild(row);
                    });
                }
            } catch (err) {
                console.error("Impossible de lire l'historique :", err);
            }
        }
    </script>
</body>
</html>
